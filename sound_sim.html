<html>
<head>
    <title>Sound Sim</title>
</head>
<body>
    <h1>Sound Sim</h1>

    <div id="logout" style="background-color:black;color:white;width:64px;cursor:pointer;text-align:center;">
        Logout
    </div>
    <div id="create_group_window">
        <h2>Create Sim Group</h2>

        <input id="group_name" type="text" placeholder="Group Name">
        <br><br>

        <input id="group_password" type="password" placeholder="Group Password">
        <br><br>

        <div id="create_group" style="background:black;color:white;width:120px;padding:6px;cursor:pointer;text-align:center;">
            Create
        </div>
    </div>

    <h2>Current Group</h2>
    <div id="group_list"></div>
    <div id="sound_board" style="width: 1200px; height: 64px; border: 1px solid black;"></div>
    <div id="participants" style="width:1200px; min-height:420px; border:1px solid black; display:flex; flex-direction:row; flex-wrap:wrap;"></div>
    </div>
    <div id="user_view" style="width: 96%; height: 96%; background-color: aliceblue; display: flex; flex-direction: column; text-align: center; justify-content: center; align-items: center;">
        <div id="group_name_user">placeholder</div>
        <div style="width: 50%; height: 90%; background-color: grey; border-radius: 90%; display: flex; flex-direction: column; align-items: center; justify-content: center;">Stethoscope</div>
        <div id="exit_group" style="background-color: black; color: white; margin: 12px; padding: 3px; font-size: 24px; cursor: pointer;" title="exit group"> Exit</div>
    </div>
</body>
<script type="module" src="./sound_sim.js"></script>

</html>
