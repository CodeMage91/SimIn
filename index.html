<html>
    <head>
        <title>SIM Welcome</title>
    </head>
    <body>
        <div style="width: 100%; height: 48px; border: 1px solid black; display: flex; flex-direction: row; justify-content: space-evenly; align-items: center;">
            <div id="log_button" style="background-color: #222; color: white; padding: 4px; border-radius: 7px; cursor: pointer;">Login</div>
            <div id="sign_button" style="background-color: #222; color: white; padding: 4px; border-radius: 7px; cursor: pointer;">Sign Up</div>
        </div>
        <div id="log_window" style="width: 420px; height: 240px; border: 1px solid black; border-radius: 7px; margin: auto; position: relative; top: 12px; display: flex; flex-direction: column; background-color: #222; justify-content: space-around; align-items: center;">
            <form id="login_form" justify-content: space-around; align-items: center;>
                <input type="text" id="username_input_log" style="width: 90%;height: 26px; font-size: 24px; padding: 3px; border-radius: 7px; text-align: center; position: relative; margin: auto;" placeholder="Enter User Name...">
                 <div id="login_submit" type="button" style="color: white; font-size: 28px; border-radius: 7px; border: 3px outset black; padding: auto; text-align: center; margin: auto; width: 50%; position: relative; top: 12px; cursor: pointer;" title="click to login">Login</div>
            </form>
        </div>
    </body>
    <script src="./users.js"></script>
    <script type="module" src="./index.js"></script>
</html>
